<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings Menu</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="settings-container">
        <h1>Settings Menu</h1>
        <form>
            <section class="account-settings">
                <h2>Account Settings</h2>
                <label for="username">Username:</label>
                <input type="text" id="username" name="username">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email">
            </section>
            <section class="security">
                <h2>Security</h2>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password">
                <label for="2fa">Enable Two-Factor Authentication:</label>
                <input type="checkbox" id="2fa" name="2fa">
            </section>
            <section class="notifications">
                <h2>Notifications</h2>
                <label for="email-notifications">Email Notifications:</label>
                <input type="checkbox" id="email-notifications" name="email-notifications">
                <label for="sms-notifications">SMS Notifications:</label>
                <input type="checkbox" id="sms-notifications" name="sms-notifications">
            </section>
            <section class="api-keys">
                <h2>API Keys</h2>
                <label for="api-key">API Key:</label>
                <input type="text" id="api-key" name="api-key">
            </section>
            <section class="billing">
                <h2>Billing</h2>
                <label for="payment-method">Payment Method:</label>
                <select id="payment-method" name="payment-method">
                    <option value="credit">Credit Card</option>
                    <option value="paypal">PayPal</option>
                </select>
            </section>
            <section class="system-preferences">
                <h2>System Preferences</h2>
                <label for="language">Language:</label>
                <select id="language" name="language">
                    <option value="en">English</option>
                    <option value="es">Spanish</option>
                </select>
            </section>
            <button type="submit">Save Changes</button>
        </form>
    </div>
</body>
</html>

<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f0f0f0;
    margin: 0;
    padding: 20px;
}

.settings-container {
    background-color: #fff;
    border-radius: 8px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    padding: 20px;
}
form {
    display: flex;
    flex-direction: column;
}
section {
    margin-bottom: 20px;
}
label {
    margin-bottom: 5px;
}
input, select {
    padding: 10px;
    margin-bottom: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
}
button {
    padding: 10px;
    background-color: #007BFF;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}
button:hover {
    background-color: #0056b3;
}
@media (max-width: 600px) {
    .settings-container {
        padding: 10px;
    }
} 
</style>
