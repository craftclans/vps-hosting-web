<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .dashboard-card {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="mb-4">VPS Dashboard</h1>
        <div class="row">
            <div class="col-md-4">
                <div class="card dashboard-card">
                    <div class="card-header">
                        <h5>User VPS Instances</h5>
                    </div>
                    <div class="card-body">
                        <ul class="list-group">
                            <li class="list-group-item">Instance 1: Running</li>
                            <li class="list-group-item">Instance 2: Stopped</li>
                            <li class="list-group-item">Instance 3: Running</li>
                        </ul>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card dashboard-card">
                    <div class="card-header">
                        <h5>Statistics</h5>
                    </div>
                    <div class="card-body">
                        <p>CPU Usage: 72%</p>
                        <p>Memory Usage: 60%</p>
                        <p>Disk Usage: 45%</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card dashboard-card">
                    <div class="card-header">
                        <h5>Management Options</h5>
                    </div>
                    <div class="card-body">
                        <button class="btn btn-primary">Start Instance</button>
                        <button class="btn btn-danger">Stop Instance</button>
                        <button class="btn btn-warning">Reboot Instance</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.0.7/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
